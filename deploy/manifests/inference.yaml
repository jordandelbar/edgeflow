# Static infrastructure — applied once at cluster setup.
# Deployments are created dynamically by edgeflow-server when a deployment
# is triggered for a target.  Only the Services live here.
apiVersion: v1
kind: Service
metadata:
  name: edgeflow-inference-iris-inference
spec:
  type: NodePort
  selector:
    app: edgeflow-inference-iris-inference
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30808
---
apiVersion: v1
kind: Service
metadata:
  name: edgeflow-inference-adult-inference
spec:
  type: NodePort
  selector:
    app: edgeflow-inference-adult-inference
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30809
