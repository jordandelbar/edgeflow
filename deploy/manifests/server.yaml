apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: edgeflow-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgeflow-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edgeflow-server
  template:
    metadata:
      labels:
        app: edgeflow-server
    spec:
      containers:
        - name: edgeflow-server
          image: edgeflow-server:dev
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: EDGEFLOW_DATA_DIR
              value: /data
            - name: EDGEFLOW_ADDR
              value: 0.0.0.0:5000
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/2.0/mlflow/experiments/list
              port: 5000
            initialDelaySeconds: 2
            periodSeconds: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: edgeflow-data
---
apiVersion: v1
kind: Service
metadata:
  name: edgeflow-server
spec:
  type: NodePort
  selector:
    app: edgeflow-server
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
