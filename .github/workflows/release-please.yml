name: release-please

# Runs on every push to main. release-please decides what to do:
#   - unreleased feat:/fix: commits  -> opens or updates a single Release PR
#   - merge of a Release PR           -> creates the git tag + GitHub release
#   - nothing to do                   -> no-op
# workflow_dispatch is also wired so you can re-run manually if needed.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # Use a PAT so tag/release creation triggers publish-* workflows.
          # GITHUB_TOKEN-created tags don't trigger downstream workflows by design.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
