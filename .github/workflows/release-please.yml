name: release-please

# Manual trigger: open a Release PR on demand.
# Run via the GitHub Actions UI ("Run workflow") or `gh workflow run release-please.yml`.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
