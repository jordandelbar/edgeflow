apiVersion: k3d.io/v1alpha5
kind: Simple
metadata:
  name: edgeflow
servers: 1
agents: 3
ports:
  - port: 5000:30500
    nodeFilters: [loadbalancer]
  - port: 8080:30808
    nodeFilters: [loadbalancer]
  - port: 8081:30809
    nodeFilters: [loadbalancer]
  - port: 3000:30300
    nodeFilters: [loadbalancer]
  - port: 9090:30909
    nodeFilters: [loadbalancer]

registries:
  create:
    name: k3d-registry
    host: "0.0.0.0"
    hostPort: "5001"
  config: |
    mirrors:
      "localhost:5001":
        endpoint:
          - http://k3d-registry:5000

options:
  k3d:
    wait: true
