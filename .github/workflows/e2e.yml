name: E2E Tutorials

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.e2e == 'true' || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            e2e:
              - 'crates/**'
              - '!crates/k8s/**'
              - 'apps/server/**'
              - 'apps/inference/**'
              - 'apps/sdk/**'
              - 'examples/**'
              - 'deploy/**'
              - 'tests/e2e/**'
              - '.github/workflows/e2e.yml'
              - '.github/actions/build-wasm-transform/**'

  tutorials:
    name: tutorials
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2

      - uses: Swatinem/rust-cache@v2

      - uses: ./.github/actions/build-wasm-transform

      - uses: docker/setup-buildx-action@v3

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: build stack images
        uses: docker/bake-action@v5
        with:
          files: deploy/docker-bake.hcl
          targets: |
            server
            inference-ort
          load: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max

      - name: run tutorial e2e tests
        working-directory: tests/e2e
        run: uv run pytest -v

      - name: dump stack logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.yaml logs --no-color
