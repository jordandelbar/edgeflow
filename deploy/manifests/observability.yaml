# Observability stack: OTel Collector → Prometheus + Tempo, Grafana
# Apply once:  kubectl apply -f deploy/manifests/observability.yaml
# Remove:      kubectl delete -f deploy/manifests/observability.yaml

# ── OTel Collector ────────────────────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: otelcol-config
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317

    processors:
      batch:

    exporters:
      prometheus:
        endpoint: 0.0.0.0:8889
        namespace: edgeflow
      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [batch]
          exporters: [prometheus]
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [otlp/tempo]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otelcol
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otelcol
  template:
    metadata:
      labels:
        app: otelcol
    spec:
      containers:
        - name: otelcol
          image: localhost:5001/otel-collector-contrib:0.145.0
          args: ["--config=/etc/otelcol/config.yaml"]
          ports:
            - containerPort: 4317
            - containerPort: 8889
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
      volumes:
        - name: config
          configMap:
            name: otelcol-config
---
apiVersion: v1
kind: Service
metadata:
  name: otelcol
spec:
  selector:
    app: otelcol
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: prometheus-scrape
      port: 8889
      targetPort: 8889

# ── Prometheus ────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: otelcol
        static_configs:
          - targets: ["otelcol:8889"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: localhost:5001/prometheus:v3.3.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30909
  type: NodePort

# ── Tempo ─────────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
data:
  config.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/blocks
        wal:
          path: /var/tempo/wal
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tempo-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tempo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tempo
  template:
    metadata:
      labels:
        app: tempo
    spec:
      containers:
        - name: tempo
          image: localhost:5001/grafana/tempo:2.7.2
          args: ["-config.file=/etc/tempo/config.yaml"]
          ports:
            - containerPort: 3200
            - containerPort: 4317
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
      volumes:
        - name: config
          configMap:
            name: tempo-config
        - name: data
          persistentVolumeClaim:
            claimName: tempo-data
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
spec:
  selector:
    app: tempo
  ports:
    - name: http
      port: 3200
      targetPort: 3200
    - name: otlp-grpc
      port: 4317
      targetPort: 4317

# ── Grafana ───────────────────────────────────────────────────────────────────
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
data:
  datasources.yaml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus:9090
        isDefault: true
        editable: false

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo:3200
        editable: false
        jsonData:
          tracesToLogsV2:
            enabled: false
          serviceMap:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
data:
  dashboards.yaml: |
    apiVersion: 1

    providers:
      - name: edgeflow
        folder: edgeflow
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
data:
  inference.json: |
    {
      "uid": "edgeflow-inference",
      "title": "edgeflow - inference",
      "tags": ["edgeflow"],
      "refresh": "10s",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum by (target) (rate(edgeflow_inference_requests_total[1m]))",
              "legendFormat": "{{target}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Active requests",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(edgeflow_inference_requests_active)",
              "legendFormat": "active"
            }
          ]
        },
        {
          "id": 3,
          "title": "Memory RSS (MB)",
          "type": "stat",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "edgeflow_inference_memory_rss_bytes / 1024 / 1024",
              "legendFormat": "rss"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "mbytes" }
          }
        },
        {
          "id": 4,
          "title": "Inference duration",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 20, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum by (le, target) (rate(edgeflow_inference_duration_seconds_bucket[1m])))",
              "legendFormat": "p50 {{target}}"
            },
            {
              "expr": "histogram_quantile(0.95, sum by (le, target) (rate(edgeflow_inference_duration_seconds_bucket[1m])))",
              "legendFormat": "p95 {{target}}"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le, target) (rate(edgeflow_inference_duration_seconds_bucket[1m])))",
              "legendFormat": "p99 {{target}}"
            }
          ],
          "fieldConfig": {
            "defaults": { "unit": "s" }
          }
        }
      ],
      "schemaVersion": 39
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: localhost:5001/grafana:11.6.1
          env:
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30300
  type: NodePort
