[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Transitive advisories we cannot fix without an upstream release in `rumqttd`.
# Each ignore should have a tracking issue so we revisit when upstream moves.
ignore = [
    # rustls-pemfile 2.x marked unmaintained; pulled in by rumqttd's old rustls 0.22.
    { id = "RUSTSEC-2025-0134", reason = "transitive via rumqttd 0.20; awaiting upstream rustls bump" },
    # rustls-webpki 0.102.x CVE family - same chain.
    { id = "RUSTSEC-2026-0049", reason = "rustls-webpki 0.102 via rumqttd; awaiting upstream" },
    { id = "RUSTSEC-2026-0098", reason = "rustls-webpki 0.102 via rumqttd; awaiting upstream" },
    { id = "RUSTSEC-2026-0099", reason = "rustls-webpki 0.102 via rumqttd; awaiting upstream" },
    { id = "RUSTSEC-2026-0104", reason = "rustls-webpki 0.102 via rumqttd; awaiting upstream" },
]

[licenses]
version = 2
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.93

# Per-crate license exceptions. Unlicense is a public-domain dedication
# whose legal status is debated; we accept it only for these three
# transitives pulled via rumqttd's ws_stream_tungstenite chain.
[[licenses.exceptions]]
allow = ["Unlicense"]
crate = "async_io_stream"

[[licenses.exceptions]]
allow = ["Unlicense"]
crate = "pharos"

[[licenses.exceptions]]
allow = ["Unlicense"]
crate = "ws_stream_tungstenite"

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
