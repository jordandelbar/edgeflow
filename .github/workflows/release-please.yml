name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/checkout@v4
        if: steps.release.outputs.pr
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ steps.app-token.outputs.token }}
      - uses: dtolnay/rust-toolchain@stable
        if: steps.release.outputs.pr
      - uses: Swatinem/rust-cache@v2
        if: steps.release.outputs.pr
      - name: refresh Cargo.lock
        if: steps.release.outputs.pr
        run: |
          cargo metadata --format-version 1 --quiet > /dev/null
          if git diff --quiet Cargo.lock; then
            echo "Cargo.lock already up to date"
          else
            git config user.email "279289800+edgeflow-releases[bot]@users.noreply.github.com"
            git config user.name "edgeflow-releases[bot]"
            git add Cargo.lock
            git commit -m "chore: Refresh Cargo.lock"
            git push
          fi
