# Static infrastructure — applied once at cluster setup.
# The Deployment is created dynamically by edgeflow-server when a deployment
# is triggered for this target.  Only the Service lives here.
apiVersion: v1
kind: Service
metadata:
  name: edgeflow-inference-iris-inference
spec:
  type: NodePort
  selector:
    app: edgeflow-inference-iris-inference
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30808
