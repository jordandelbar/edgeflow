apiVersion: v1
kind: ServiceAccount
metadata:
  name: edgeflow-server
---
# Namespace-scoped: manage inference Deployments
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: edgeflow-server
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: edgeflow-server
subjects:
  - kind: ServiceAccount
    name: edgeflow-server
roleRef:
  kind: Role
  name: edgeflow-server
  apiGroup: rbac.authorization.k8s.io
---
# Cluster-scoped: list nodes (Nodes are not namespace-scoped)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: edgeflow-server-nodes
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: edgeflow-server-nodes
subjects:
  - kind: ServiceAccount
    name: edgeflow-server
    namespace: default
roleRef:
  kind: ClusterRole
  name: edgeflow-server-nodes
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: edgeflow-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgeflow-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edgeflow-server
  template:
    metadata:
      labels:
        app: edgeflow-server
    spec:
      serviceAccountName: edgeflow-server
      nodeSelector:
        edgeflow-role: server
      containers:
        - name: edgeflow-server
          image: localhost:5001/edgeflow-server:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
            - containerPort: 1883
          env:
            - name: EDGEFLOW_DATA_DIR
              value: /data
            - name: EDGEFLOW_ADDR
              value: 0.0.0.0:5000
            - name: EDGEFLOW_SERVER_URL
              value: http://edgeflow-server:5000
            - name: EDGEFLOW_INFERENCE_IMAGE
              value: localhost:5001/edgeflow-inference:dev-ort
            - name: EDGEFLOW_IMAGE_PULL_POLICY
              value: IfNotPresent
            - name: LOG_FORMAT
              value: json
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otelcol:4317
            - name: PROMETHEUS_URL
              value: http://prometheus:9090
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/2.0/mlflow/experiments/list
              port: 5000
            initialDelaySeconds: 2
            periodSeconds: 3
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: edgeflow-data
---
apiVersion: v1
kind: Service
metadata:
  name: edgeflow-server
spec:
  type: NodePort
  selector:
    app: edgeflow-server
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 30500
    - name: mqtt
      port: 1883
      targetPort: 1883
