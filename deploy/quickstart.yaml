# Edgeflow quickstart
#   curl -O https://raw.githubusercontent.com/jordandelbar/edgeflow/main/deploy/quickstart.yaml
#   docker compose -f quickstart.yaml up
services:
  server:
    image: ghcr.io/jordandelbar/edgeflow-server:latest
    environment:
      EDGEFLOW_ORCHESTRATOR: compose
      EDGEFLOW_COMPOSE_INFERENCE_URL: http://inference:8080
      EDGEFLOW_DATA_DIR: /data
      RUST_LOG: edgeflow_server=info,tower_http=warn
    ports:
      - "5000:5000"
    volumes:
      - edgeflow-data:/data

  inference:
    image: ghcr.io/jordandelbar/edgeflow-inference:latest
    environment:
      EDGEFLOW_SERVER: http://server:5000
      EDGEFLOW_TARGET: compose
      EDGEFLOW_POD_DYNAMIC_TOPIC: "true"
      EDGEFLOW_POD_IP: inference
      EDGEFLOW_INFER_ADDR: 0.0.0.0:8080
      EDGEFLOW_MQTT_URL: mqtt://server:1883
      RUST_LOG: edgeflow_inference=info
    ports:
      - "8080:8080"
    depends_on:
      - server

volumes:
  edgeflow-data:
